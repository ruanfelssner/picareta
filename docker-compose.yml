services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000' # Nuxt
      - '5000:5000' # Flask
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://root:root@mongo:27017/picareta?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLASK_PORT=5000
    depends_on:
      - mongo
      - redis
    volumes:
      - ./flask:/app/flask:ro
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '16379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
